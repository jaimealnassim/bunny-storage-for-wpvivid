<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Bunny.net brand orange circle -->
  <circle cx="50" cy="50" r="48" fill="#FF6600"/>
  <!-- Simple bunny ears + head shape in white -->
  <!-- Left ear -->
  <ellipse cx="34" cy="28" rx="8" ry="18" fill="white" transform="rotate(-12 34 28)"/>
  <!-- Right ear -->
  <ellipse cx="66" cy="28" rx="8" ry="18" fill="white" transform="rotate(12 66 28)"/>
  <!-- Head -->
  <ellipse cx="50" cy="60" rx="22" ry="20" fill="white"/>
  <!-- Left eye -->
  <circle cx="43" cy="55" r="3" fill="#FF6600"/>
  <!-- Right eye -->
  <circle cx="57" cy="55" r="3" fill="#FF6600"/>
  <!-- Nose -->
  <ellipse cx="50" cy="63" rx="3" ry="2" fill="#FF6600"/>
</svg>
